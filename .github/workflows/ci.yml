name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install python-can websockets pyserial pyserial-asyncio pyyaml aiohttp

      - name: Syntax check
        run: |
          find backend -name "*.py" | xargs python -m py_compile
          echo "Syntax OK"

      - name: Import check
        run: python .github/scripts/check_imports.py
        env:
          PYTHONPATH: ${{ github.workspace }}
