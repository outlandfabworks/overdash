# Mock / simulation config — no hardware required.
# All sources use simulate: true to generate realistic fake data.
# Use this for development, UI testing, and demos.

server:
  host: "0.0.0.0"
  port: 8765
  http_port: 8080
  broadcast_hz: 30

sources:
  - type: mock_vehicle
    name: "Mock"

